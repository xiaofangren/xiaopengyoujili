<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#FF6B9D">
    <title>🌟 小孩激励积分 🌟</title>
    <!-- PWA manifest -->
    <link rel="manifest" href="pwa/manifest.json">
    <!-- 全局样式 -->
    <link rel="stylesheet" href="css/style.css">
    <!-- 腾讯云云开发 SDK v2 -->
    <script src="js/cloudbase.full.js"></script>
</head>
<body>
    <!-- 页面容器 -->
    <div id="app">
        <!-- 登录页 -->
        <div id="page-login" class="page active">
            <div class="login-container">
                <div class="login-logo">🌟🏠🌟</div>
                <h1 class="login-title">小孩激励积分</h1>
                <p class="login-subtitle">完成任务，赚取积分，兑换奖励！</p>
                <div class="login-form">
                    <input type="text" id="login-username" placeholder="请输入你的昵称" maxlength="20" autocomplete="off">
                    <div class="role-selector">
                        <span class="role-label">我是：</span>
                        <button type="button" class="role-btn active" data-role="child" onclick="this.closest('.login-form').querySelectorAll('.role-btn').forEach(b=>b.classList.remove('active'));this.classList.add('active');">👶 小孩</button>
                        <button type="button" class="role-btn" data-role="parent" onclick="this.closest('.login-form').querySelectorAll('.role-btn').forEach(b=>b.classList.remove('active'));this.classList.add('active');">👨‍👩‍👧 家长</button>
                    </div>
                    <button id="btn-login" class="btn btn-primary btn-large">🚀 开始冒险</button>
                </div>
                <div class="login-tips">
                    <p>👨‍👩‍👧 家长可在「我的」页面管理任务与奖励</p>
                </div>
            </div>
        </div>

        <!-- 首页 -->
        <div id="page-home" class="page">
            <div class="page-header">
                <h1>🏠 积分总览</h1>
            </div>
            <div id="home-content"></div>
        </div>

        <!-- 任务页 -->
        <div id="page-tasks" class="page">
            <div class="page-header">
                <h1>📋 任务</h1>
            </div>
            <div id="tasks-content"></div>
        </div>

        <!-- 奖励页 -->
        <div id="page-rewards" class="page">
            <div class="page-header">
                <h1>🎁 奖励</h1>
            </div>
            <div id="rewards-content"></div>
        </div>

        <!-- 抽奖页 -->
        <div id="page-lottery" class="page">
            <div class="page-header">
                <h1>🎰 幸运抽奖</h1>
            </div>
            <div id="lottery-content"></div>
        </div>

        <!-- 我的 -->
        <div id="page-logs" class="page">
            <div class="page-header">
                <h1>👤 我的</h1>
            </div>
            <div id="logs-content"></div>
        </div>

        <!-- 底部导航栏 -->
        <div id="tab-bar" class="tab-bar">
            <div class="tab-item" data-page="tasks">
                <span class="tab-icon">📋</span>
                <span class="tab-label">任务</span>
            </div>
            <div class="tab-item" data-page="rewards">
                <span class="tab-icon">🎁</span>
                <span class="tab-label">奖励</span>
            </div>
            <div class="tab-item" data-page="lottery">
                <span class="tab-icon">🎰</span>
                <span class="tab-label">抽奖</span>
            </div>
            <div class="tab-item" data-page="logs">
                <span class="tab-icon">👤</span>
                <span class="tab-label">我的</span>
            </div>
        </div>

        <!-- 通用弹窗 -->
        <div id="modal-overlay" class="modal-overlay hidden">
            <div id="modal-content" class="modal-content"></div>
        </div>

        <!-- 加载提示 -->
        <div id="loading" class="loading-overlay hidden">
            <div class="loading-spinner">⏳</div>
            <p>加载中...</p>
        </div>
    </div>

    <!-- 工具函数 -->
    <script>
        // 声明 Pages 对象，供所有页面模块使用
        const Pages = {};
    </script>
    <script src="js/cloud.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/components/tabBar.js"></script>
    <script src="js/pages/login.js"></script>
    <script src="js/pages/home.js"></script>
    <script src="js/pages/tasks.js"></script>
    <script src="js/pages/rewards.js"></script>
    <script src="js/pages/lottery.js"></script>
    <script src="js/pages/logs.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
